apiVersion: v1
data:
  config.yaml: "controller:\n  poll_interval_seconds: 5\n  default_mode: raasa\n  log_directory:
    /app/raasa/logs\n\npolicy:\n  thresholds:\n    l1_max: 0.35\n    l2_max: 0.50\n
    \ hysteresis_band: 0.04\n  cooldown_seconds: 25\n  l3_min_confidence: 0.15\n  low_risk_streak_required:
    4\n  l3_requires_approval: false\n\nrisk:\n  weights:\n    cpu: 0.55\n    memory:
    0.55\n    process: 0.55\n    network: 0.55\n    syscall: 0.55\n  confidence_window:
    5\n\ntelemetry:\n  network_cap: 500000.0\n  syscall_cap: 500.0\n  syscall_source:
    probe\n  syscall_probe_directory: /var/run/raasa\n  syscall_probe_max_age_seconds:
    15\n\nml:\n  use_ml_model: false\n  model_path: \"/app/raasa/models/model.joblib\"\n\nenforcement:\n
    \ cpus_by_tier:\n    L1: 1.0\n    L2: 0.5\n    L3: 0.1\n  live_run_guardrails:\n
    \   initial_cpus: 0.50\n    memory_limit: 256m\n    pids_limit: 64\n    default_smoke_duration_seconds:
    30\n\nevaluation:\n  controller_variant: linear_tuned\r\n"
