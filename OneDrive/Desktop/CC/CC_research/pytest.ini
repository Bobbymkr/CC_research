[pytest]
addopts = --basetemp=tests/.pytest_tmp
cache_dir = tests/.pytest_cache
testpaths = tests
pythonpath = .
norecursedirs = tests/.pytest_cache tests/.pytest_tmp tests/.tmp_runtime tests/.tmp_approval tests/.tmp_override tests/.tmp_k8s_probe tests/.tmp_ml_model tests/.tmp_logger tests/.tmp_syscalls pytest-cache-files-*
