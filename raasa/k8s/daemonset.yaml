---
# RAASA DaemonSet — Production Kubernetes Deployment
#
# This manifest deploys one RAASA agent pod per node in the cluster.
# Each agent monitors only the pods scheduled on its node, keeping the
# blast radius of a compromised agent bounded to a single node.
#
# Prerequisites:
#   1. kubectl apply -f daemonset.yaml     (this file, includes RBAC)
#   2. Metrics Server must be installed:
#      kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#
# Usage:
#   kubectl logs -n raasa-system -l app=raasa-agent --follow

apiVersion: v1
kind: Namespace
metadata:
  name: raasa-system
  labels:
    app.kubernetes.io/name: raasa
    app.kubernetes.io/component: security-agent

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: raasa-agent
  namespace: raasa-system
  labels:
    app: raasa-agent
    app.kubernetes.io/version: "1.0"
spec:
  selector:
    matchLabels:
      app: raasa-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1        # Never take down more than 1 node agent at once
  template:
    metadata:
      labels:
        app: raasa-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      # ── Service Account (RBAC) ────────────────────────────────────────────
      serviceAccountName: raasa-agent
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      # ── Priority: run even on tainted/master nodes ────────────────────────
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - key: "CriticalAddonsOnly"
          operator: "Exists"

      # ── Host access for eBPF and cgroup telemetry ─────────────────────────
      hostPID: true           # Required for eBPF sidecar to access host tracepoints
      hostNetwork: true       # Required for Enforcer to shape host veths via tc

      volumes:
        - name: proc
          hostPath:
            path: /proc        # For per-pod cgroup CPU/memory reads
        - name: sys
          hostPath:
            path: /sys         # For cgroup v2 metrics
        - name: bpf-fs
          hostPath:
            path: /sys/fs/bpf  # Shared BPF pinning surface for LSM maps
            type: Directory
        - name: raasa-probe-dir
          hostPath:
            path: /var/run/raasa   # Shared syscall probe directory
            type: DirectoryOrCreate
        - name: raasa-ipc
          emptyDir:
            medium: Memory         # Per-pod signed IPC keys and socket
        - name: audit-logs
          emptyDir: {}
        - name: config
          configMap:
            name: raasa-config
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug   # Required for bpftrace tracepoint access

      # ── RAASA Agent Container ─────────────────────────────────────────────
      containers:
        - name: raasa-agent
          image: raasa/agent:1.0.0       # Built from raasa/k8s/Dockerfile
          imagePullPolicy: IfNotPresent
          args:
            - "--mode"
            - "raasa"
            - "--backend"
            - "k8s"
            - "--config"
            - "/etc/raasa/config.yaml"
            - "--iterations"
            - "0"                        # 0 = run indefinitely
            - "--metrics-port"
            - "9090"                     # Prometheus scrape endpoint
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName    # Injected by k8s downward API
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PYTHONPATH
              value: "/app"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: RAASA_OVERRIDE_PATH
              value: "/app/raasa/logs/overrides.json"
            - name: RAASA_APPROVAL_PATH
              value: "/app/raasa/logs/approvals.json"
            - name: RAASA_IPC_SOCKET_PATH
              value: "/var/run/raasa/ipc/enforcer.sock"
            - name: RAASA_IPC_SIGNING_PRIVATE_KEY
              value: "/var/run/raasa/ipc/command_signing_key.pem"
            - name: RAASA_IPC_SIGNING_PUBLIC_KEY
              value: "/var/run/raasa/ipc/command_signing_key.pub"
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: raasa-probe-dir
              mountPath: /var/run/raasa
            - name: raasa-ipc
              mountPath: /var/run/raasa/ipc
            - name: audit-logs
              mountPath: /app/raasa/logs
            - name: config
              mountPath: /etc/raasa
          resources:
            requests:
              cpu: "50m"           # ~0.05 vCPU at steady state
              memory: "128Mi"
            limits:
              cpu: "200m"          # Never exceed 0.2 vCPU
              memory: "512Mi"      # Bounded memory footprint
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL

        # ── Capability-Scoped Enforcer Sidecar ───────────────────────────────
        # Executes IPC commands from the unprivileged controller.
        - name: raasa-enforcer
          image: raasa/agent:1.0.0
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "raasa.k8s.enforcer_sidecar"]
          env:
            - name: RAASA_IPC_GID
              value: "1000"
            - name: RAASA_IPC_SOCKET_PATH
              value: "/var/run/raasa/ipc/enforcer.sock"
            - name: RAASA_IPC_SIGNING_PUBLIC_KEY
              value: "/var/run/raasa/ipc/command_signing_key.pub"
            - name: RAASA_IPC_PUBLIC_KEY_WAIT_SECONDS
              value: "60"
            - name: RAASA_LSM_BLOCK_MAP_PIN
              value: "/sys/fs/bpf/raasa/maps/raasa_lsm_blocked_tgids"
            - name: RAASA_ENFORCER_LOAD_BPF
              value: "true"
            - name: RAASA_BPF_PROBE_DIR
              value: "/var/run/raasa"
            - name: RAASA_BPF_PIN_DIR
              value: "/sys/fs/bpf/raasa"
            - name: RAASA_BPF_CGROUP_PATH
              value: "/sys/fs/cgroup"
            - name: RAASA_BPF_EXPORT_INTERVAL_SECONDS
              value: "5"
          securityContext:
            runAsUser: 0                  # Override Dockerfile USER to run as root
            runAsGroup: 1000
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_ADMIN              # For tc shaping on host veths
                - SYS_ADMIN              # For cgroup v2 memory.max writes
          volumeMounts:
            - name: raasa-probe-dir
              mountPath: /var/run/raasa   # Exports pod_edges.jsonl for ObserverK8s
            - name: raasa-ipc
              mountPath: /var/run/raasa/ipc  # For signed IPC socket and keys
            - name: sys
              mountPath: /sys             # For cgroups memory.max writes
            - name: bpf-fs
              mountPath: /sys/fs/bpf      # For eBPF LSM block map updates
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

        # ── eBPF Sidecar: Syscall Rate Probe ─────────────────────────────────
        # The enforcer's Python BPF loader owns sock_ops + LSM load/attach and
        # exports pod_edges.jsonl. This sidecar keeps per-pod syscall, file,
        # and DNS sample collection isolated in the probe image.
        - name: syscall-probe
          image: raasa/ebpf-probe:1.0.0   # Custom bpftrace image
          imagePullPolicy: IfNotPresent
          env:
            - name: ENABLE_SOCK_OPS_PROBE
              value: "0"
            - name: ENABLE_LSM_EXEC_BLOCKING
              value: "0"
          securityContext:
            privileged: true              # Required for eBPF BPF syscall
            capabilities:
              add:
                - SYS_ADMIN              # For BPF map creation
                - SYS_PTRACE             # For cross-namespace PID visibility
          volumeMounts:
            - name: proc
              mountPath: /proc
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: bpf-fs
              mountPath: /sys/fs/bpf      # Pins RAASA BPF programs and maps here
            - name: debugfs
              mountPath: /sys/kernel/debug
              readOnly: true
            - name: raasa-probe-dir
              mountPath: /var/run/raasa  # Writes syscall_rate files here
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

      # ── Scheduling ────────────────────────────────────────────────────────
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      restartPolicy: Always

---
# RBAC: Minimum Kubernetes API permissions for RAASA agent
apiVersion: v1
kind: ServiceAccount
metadata:
  name: raasa-agent
  namespace: raasa-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: raasa-agent
rules:
  # Pod inspection — needed to enumerate pods on this node
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch"]
  # NetworkPolicy enforcement — needed for L3 control-plane isolation
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "patch", "delete"]
  # Node proxy — needed to fetch cAdvisor metrics for network telemetry
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get"]
  # Metrics API — needed for CPU/memory measurements
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: raasa-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: raasa-agent
subjects:
  - kind: ServiceAccount
    name: raasa-agent
    namespace: raasa-system

---
# ConfigMap: RAASA configuration for the DaemonSet agent
apiVersion: v1
kind: ConfigMap
metadata:
  name: raasa-config
  namespace: raasa-system
data:
  config.yaml: |
    controller:
      poll_interval_seconds: 5
      default_mode: raasa
      log_directory: /app/raasa/logs

    policy:
      thresholds:
        l1_max: 0.35
        l2_max: 0.60
      hysteresis_band: 0.04
      cooldown_seconds: 25
      l3_min_confidence: 0.20
      low_risk_streak_required: 4
      l3_requires_approval: false

    risk:
      weights:
        cpu: 0.55
        memory: 0.55
        process: 0.55
        network: 0.55
        syscall: 0.55
        syscall_jsd: 0.55
        file_entropy: 0.55
        network_entropy: 0.55
        dns_entropy: 0.55
      confidence_window: 5

    telemetry:
      network_cap: 500000.0
      syscall_cap: 5000.0
      syscall_source: probe
      syscall_probe_directory: /var/run/raasa
      syscall_probe_max_age_seconds: 15

    ml:
      use_ml_model: false
      model_path: "/app/raasa/models/model.joblib"
      use_behavioral_dna: true
      behavioral_dna_model_path: "/app/raasa/models/behavioral_dna_registry.joblib"
      use_temporal_lstm: true
      temporal_lstm_model_path: "/app/raasa/models/temporal_lstm.keras"

    audit:
      kms_hmac:
        enabled: false
        key_id: ""
        region: ""
        profile: ""
        mac_algorithm: HMAC_SHA_256

    enforcement:
      cpus_by_tier:
        L1: 1.0
        L2: 0.5
        L3: 0.1        # In K8s: patch pod's cpu limit via PodDisruptionBudget
      live_run_guardrails:
        initial_cpus: 0.50
        memory_limit: 256m
        pids_limit: 64
        default_smoke_duration_seconds: 30

    evaluation:
      controller_variant: v2_full_pipeline
