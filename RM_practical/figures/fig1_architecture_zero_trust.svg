<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920">
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #132238; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #4b5b70; }
      .section { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #22354a; }
      .label { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #17324d; }
      .small { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #4d6177; }
      .box { stroke: #2f4f6f; stroke-width: 2; rx: 20; ry: 20; }
      .telemetry { fill: #eef6ff; }
      .brain { fill: #f5f9ff; }
      .docker { fill: #eefcf5; }
      .k8s { fill: #fff4ea; }
      .priv { fill: #ffe7d1; }
      .audit { fill: #f4efff; }
      .arrow { stroke: #31567a; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .feedback { stroke: #6d7f95; stroke-width: 3; stroke-dasharray: 10 7; fill: none; marker-end: url(#arrowSmall); }
      .divider { stroke: #d1dce8; stroke-width: 2; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#31567a"/>
    </marker>
    <marker id="arrowSmall" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6d7f95"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="920" fill="#ffffff"/>

  <text x="800" y="54" text-anchor="middle" class="title">Figure 1. RAASA Architecture</text>
  <text x="800" y="84" text-anchor="middle" class="subtitle">Adaptive containment loop with zero-trust privileged enforcement path</text>

  <text x="115" y="145" class="section">Telemetry Inputs</text>
  <rect x="70" y="165" width="280" height="460" class="box telemetry"/>

  <rect x="100" y="205" width="220" height="72" class="box telemetry"/>
  <text x="210" y="248" text-anchor="middle" class="label">CPU / Memory</text>

  <rect x="100" y="305" width="220" height="72" class="box telemetry"/>
  <text x="210" y="348" text-anchor="middle" class="label">Process Count</text>

  <rect x="100" y="405" width="220" height="72" class="box telemetry"/>
  <text x="210" y="448" text-anchor="middle" class="label">Network Throughput</text>

  <rect x="100" y="505" width="220" height="72" class="box telemetry"/>
  <text x="210" y="548" text-anchor="middle" class="label">Syscall-Rate Signal</text>

  <text x="470" y="145" class="section">Unprivileged Controller</text>
  <rect x="410" y="165" width="700" height="460" class="box brain"/>

  <rect x="450" y="315" width="170" height="86" class="box brain"/>
  <text x="535" y="350" text-anchor="middle" class="label">Observer</text>
  <text x="535" y="376" text-anchor="middle" class="small">collects runtime telemetry</text>

  <rect x="665" y="315" width="180" height="86" class="box brain"/>
  <text x="755" y="350" text-anchor="middle" class="label">Feature Extractor</text>
  <text x="755" y="376" text-anchor="middle" class="small">normalizes 5 signals</text>

  <rect x="890" y="315" width="180" height="86" class="box brain"/>
  <text x="980" y="350" text-anchor="middle" class="label">Risk Assessor</text>
  <text x="980" y="376" text-anchor="middle" class="small">bounded score, trend, confidence</text>

  <rect x="655" y="450" width="200" height="96" class="box audit"/>
  <text x="755" y="488" text-anchor="middle" class="label">Audit Logger</text>
  <text x="755" y="516" text-anchor="middle" class="small">JSONL evidence, reasons, tiers</text>

  <rect x="1115" y="295" width="230" height="126" class="box brain"/>
  <text x="1230" y="336" text-anchor="middle" class="label">Policy Reasoner</text>
  <text x="1230" y="365" text-anchor="middle" class="small">hysteresis, cooldown,</text>
  <text x="1230" y="388" text-anchor="middle" class="small">confidence gate, approval, override</text>

  <line x1="350" y1="390" x2="450" y2="358" class="arrow"/>
  <line x1="620" y1="358" x2="665" y2="358" class="arrow"/>
  <line x1="845" y1="358" x2="890" y2="358" class="arrow"/>
  <line x1="1070" y1="358" x2="1115" y2="358" class="arrow"/>
  <line x1="1230" y1="421" x2="1230" y2="470" class="arrow"/>
  <line x1="1115" y1="484" x2="855" y2="498" class="arrow"/>

  <line x1="390" y1="655" x2="1390" y2="655" class="divider"/>
  <text x="115" y="710" class="section">Local Enforcement Path</text>
  <text x="845" y="710" class="section">Cloud-Native Enforcement Path</text>

  <rect x="70" y="735" width="420" height="120" class="box docker"/>
  <text x="280" y="778" text-anchor="middle" class="label">Docker CPU Throttling</text>
  <text x="280" y="806" text-anchor="middle" class="small">`docker update --cpus`</text>
  <text x="280" y="830" text-anchor="middle" class="small">simple local containment path</text>

  <rect x="620" y="705" width="830" height="170" class="box k8s"/>
  <rect x="655" y="755" width="160" height="74" class="box k8s"/>
  <text x="735" y="798" text-anchor="middle" class="label">Unix Socket IPC</text>

  <rect x="865" y="735" width="220" height="114" class="box priv"/>
  <text x="975" y="776" text-anchor="middle" class="label">Privileged Enforcer</text>
  <text x="975" y="804" text-anchor="middle" class="small">sidecar with constrained schema</text>
  <text x="975" y="827" text-anchor="middle" class="small">no AI logic in privileged space</text>

  <rect x="1135" y="725" width="130" height="72" class="box priv"/>
  <text x="1200" y="768" text-anchor="middle" class="label">tc Shaping</text>

  <rect x="1135" y="815" width="130" height="72" class="box priv"/>
  <text x="1200" y="858" text-anchor="middle" class="label">cgroup Memory</text>

  <line x1="1230" y1="421" x2="1230" y2="620" class="arrow"/>
  <line x1="1230" y1="620" x2="280" y2="620" class="arrow"/>
  <line x1="280" y1="620" x2="280" y2="735" class="arrow"/>

  <line x1="1230" y1="421" x2="1230" y2="620" class="arrow"/>
  <line x1="1230" y1="620" x2="735" y2="620" class="arrow"/>
  <line x1="735" y1="620" x2="735" y2="755" class="arrow"/>
  <line x1="815" y1="792" x2="865" y2="792" class="arrow"/>
  <line x1="1085" y1="792" x2="1135" y2="761" class="arrow"/>
  <line x1="1085" y1="792" x2="1135" y2="851" class="arrow"/>

  <path d="M280 735 C230 690, 215 635, 450 405" class="feedback"/>
  <path d="M1200 725 C1280 655, 1325 600, 450 405" class="feedback"/>
  <path d="M1200 815 C1310 705, 1360 625, 450 405" class="feedback"/>

  <text x="1390" y="760" text-anchor="end" class="small">zero-trust split:</text>
  <text x="1390" y="782" text-anchor="end" class="small">unprivileged reasoning</text>
  <text x="1390" y="804" text-anchor="end" class="small">privileged enforcement</text>
</svg>
